name: TrackPro CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Cache Gradle to make builds 5x faster
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 4. Give the server execution rights to Gradle file
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 5. Run local JUnit & Mockito unit tests
      - name: Run Local Unit Tests
        run: ./gradlew testDebugUnitTest

      # 6. Compile the debug APK to verify everything builds perfectly
      - name: Build Debug App
        run: ./gradlew assembleDebug